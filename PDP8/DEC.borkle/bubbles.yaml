- ID: 39
  text: '1963 DEC took the LINC basic logic design but stripped away the A/D systems
    to make the PDP-5.

    Advert in 1964 : "Now you can own the PDp-5 computer for what a core memory alone
    used to cost: $27,000"

    116 PDP-5s were produced.

    Like other machines, it inspired a series of newer models based on the same basic
    design that would go on to be more famous than its parent'
